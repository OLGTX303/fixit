<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sc-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="sc-lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="sc-mount" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <radialGradient id="sc-glare" cx="30%" cy="25%" r="45%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.70)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="sc-lens-glare" cx="35%" cy="30%" r="45%">
      <stop offset="0%" stop-color="rgba(100,180,255,0.60)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="sc-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(30,58,138,0.32)"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="190" rx="50" ry="10" fill="rgba(0,0,0,0.13)"/>

  <!-- Wall mount / arm -->
  <rect x="90" y="100" width="20" height="55" rx="8" fill="url(#sc-mount)" filter="url(#sc-shadow)"/>
  <rect x="94" y="102" width="7" height="50" rx="3" fill="rgba(255,255,255,0.22)"/>
  <!-- Mount plate -->
  <rect x="78" y="148" width="44" height="14" rx="7" fill="#2563EB"/>
  <ellipse cx="100" cy="155" rx="22" ry="6" fill="#3B82F6"/>

  <!-- Camera housing (dome + body) -->
  <!-- Main body -->
  <ellipse cx="100" cy="90" rx="46" ry="32" fill="url(#sc-body)" filter="url(#sc-shadow)"/>
  <!-- Top dome highlight -->
  <ellipse cx="100" cy="70" rx="42" ry="20" fill="rgba(255,255,255,0.10)"/>

  <!-- Lens ring -->
  <circle cx="100" cy="92" r="22" fill="url(#sc-lens)"/>
  <circle cx="100" cy="92" r="18" fill="#0F172A"/>
  <!-- Iris -->
  <circle cx="100" cy="92" r="12" fill="#1E3A8A"/>
  <circle cx="100" cy="92" r="7"  fill="#0F172A"/>
  <!-- Lens glare -->
  <circle cx="100" cy="92" r="22" fill="url(#sc-lens-glare)"/>
  <circle cx="93"  cy="84" r="4"  fill="rgba(255,255,255,0.35)"/>

  <!-- IR LEDs around lens -->
  <circle cx="72"  cy="75" r="4" fill="#FF4444" opacity="0.9"/>
  <circle cx="128" cy="75" r="4" fill="#FF4444" opacity="0.9"/>
  <circle cx="72"  cy="109" r="4" fill="#FF4444" opacity="0.9"/>
  <circle cx="128" cy="109" r="4" fill="#FF4444" opacity="0.9"/>

  <!-- Body glare -->
  <ellipse cx="82" cy="72" rx="20" ry="10" fill="url(#sc-glare)" opacity="0.75"/>
</svg>
