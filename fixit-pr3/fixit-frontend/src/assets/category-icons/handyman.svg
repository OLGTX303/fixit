<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="hm-box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCA855"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#9A3412"/>
    </linearGradient>
    <linearGradient id="hm-lid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="hm-latch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
    <linearGradient id="hm-wrench" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="hm-screwdriver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <radialGradient id="hm-glare" cx="28%" cy="20%" r="44%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.68)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="hm-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(154,52,18,0.30)"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="192" rx="60" ry="10" fill="rgba(0,0,0,0.13)"/>

  <!-- Toolbox body -->
  <rect x="32" y="106" width="136" height="76" rx="10" fill="url(#hm-box)" filter="url(#hm-shadow)"/>
  <!-- Body rivets -->
  <circle cx="46"  cy="120" r="4" fill="rgba(0,0,0,0.15)"/>
  <circle cx="154" cy="120" r="4" fill="rgba(0,0,0,0.15)"/>
  <circle cx="46"  cy="172" r="4" fill="rgba(0,0,0,0.15)"/>
  <circle cx="154" cy="172" r="4" fill="rgba(0,0,0,0.15)"/>
  <!-- Body highlight stripe -->
  <rect x="32" y="106" width="136" height="8" rx="6 6 0 0" fill="rgba(255,255,255,0.20)"/>

  <!-- Lid -->
  <rect x="32" y="88" width="136" height="24" rx="8" fill="url(#hm-lid)" filter="url(#hm-shadow)"/>
  <rect x="32" y="88" width="136" height="6"  rx="4" fill="rgba(255,255,255,0.30)"/>

  <!-- Handle -->
  <path d="M72 88 Q100 62 128 88" stroke="url(#hm-latch)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M72 88 Q100 66 128 88" stroke="rgba(255,255,255,0.30)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Latch -->
  <rect x="86" y="100" width="28" height="14" rx="5" fill="url(#hm-latch)"/>
  <rect x="91" y="103" width="18" height="8"  rx="3" fill="rgba(255,255,255,0.25)"/>

  <!-- Tools sticking out of box -->
  <!-- Wrench -->
  <g transform="rotate(-22 80 98)">
    <rect x="74" y="38" width="12" height="68" rx="6" fill="url(#hm-wrench)"/>
    <ellipse cx="80" cy="36" rx="11" ry="8" fill="url(#hm-wrench)"/>
    <rect x="72" y="32" width="7"  height="10" rx="3" fill="#9CA3AF"/>
    <rect x="81" y="32" width="7"  height="10" rx="3" fill="#9CA3AF"/>
    <ellipse cx="76" cy="42" rx="6" ry="3" fill="rgba(255,255,255,0.30)"/>
  </g>

  <!-- Screwdriver -->
  <g transform="rotate(18 126 98)">
    <rect x="120" y="34" width="12" height="72" rx="6" fill="url(#hm-screwdriver)"/>
    <!-- Screwdriver shaft (metal tip) -->
    <rect x="122" y="96" width="8" height="28" rx="2" fill="url(#hm-wrench)"/>
    <!-- Blade tip -->
    <rect x="123" y="120" width="6" height="8" rx="1" fill="#374151"/>
    <!-- Handle highlight -->
    <rect x="122" y="36" width="4" height="68" rx="2" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- Box glare -->
  <ellipse cx="78" cy="120" rx="24" ry="14" fill="url(#hm-glare)" opacity="0.55"/>
</svg>
