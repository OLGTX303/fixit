<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pl-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="pl-pool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="pl-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="pl-float" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <radialGradient id="pl-glare" cx="30%" cy="22%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.75)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="pl-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(7,89,133,0.30)"/>
    </filter>
    <clipPath id="pl-pool-clip">
      <rect x="34" y="72" width="132" height="112" rx="16"/>
    </clipPath>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="192" rx="62" ry="10" fill="rgba(0,0,0,0.13)"/>

  <!-- Pool surround / deck (outer) -->
  <rect x="28" y="66" width="144" height="120" rx="18" fill="url(#pl-edge)" filter="url(#pl-shadow)"/>
  <!-- Pool inner water -->
  <rect x="34" y="72" width="132" height="112" rx="14" fill="url(#pl-water)"/>

  <!-- Lane dividers (lane ropes) -->
  <line x1="34" y1="108" x2="166" y2="108" stroke="rgba(255,255,255,0.50)" stroke-width="3" stroke-dasharray="6 5"/>
  <line x1="34" y1="142" x2="166" y2="142" stroke="rgba(255,255,255,0.50)" stroke-width="3" stroke-dasharray="6 5"/>

  <!-- Sparkle / light caustics on water -->
  <ellipse cx="70"  cy="86"  rx="14" ry="5" fill="rgba(255,255,255,0.22)" transform="rotate(-15 70 86)"/>
  <ellipse cx="130" cy="95"  rx="10" ry="4" fill="rgba(255,255,255,0.18)" transform="rotate(10 130 95)"/>
  <ellipse cx="80"  cy="122" rx="12" ry="4" fill="rgba(255,255,255,0.20)" transform="rotate(-8 80 122)"/>
  <ellipse cx="140" cy="130" rx="9"  ry="3" fill="rgba(255,255,255,0.16)" transform="rotate(12 140 130)"/>
  <ellipse cx="60"  cy="158" rx="11" ry="4" fill="rgba(255,255,255,0.18)" transform="rotate(-5 60 158)"/>
  <ellipse cx="120" cy="162" rx="13" ry="4" fill="rgba(255,255,255,0.20)" transform="rotate(8 120 162)"/>

  <!-- Pool float (ring buoy) -->
  <circle cx="100" cy="120" r="22" fill="url(#pl-float)" clip-path="url(#pl-pool-clip)"/>
  <circle cx="100" cy="120" r="13" fill="url(#pl-water)"/>
  <!-- Float stripes (white quarter arcs) -->
  <path d="M100 98 A22 22 0 0 1 122 120" fill="white" opacity="0.85" clip-path="url(#pl-pool-clip)"/>
  <path d="M100 142 A22 22 0 0 1 78 120"  fill="white" opacity="0.85" clip-path="url(#pl-pool-clip)"/>
  <!-- Float highlight -->
  <ellipse cx="93" cy="104" rx="8" ry="4" fill="rgba(255,255,255,0.45)"/>

  <!-- Water surface glare -->
  <rect x="34" y="72" width="132" height="40" rx="14 14 0 0" fill="url(#pl-glare)" opacity="0.55"/>
</svg>
