<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="rf-roof" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
    <linearGradient id="rf-wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="rf-door" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="rf-tile1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="rf-glare" cx="28%" cy="20%" r="42%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.68)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="rf-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(146,64,14,0.28)"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="192" rx="58" ry="10" fill="rgba(0,0,0,0.13)"/>

  <!-- House walls -->
  <rect x="44" y="108" width="112" height="76" rx="4" fill="url(#rf-wall)" filter="url(#rf-shadow)"/>
  <!-- Wall side shadow -->
  <rect x="136" y="108" width="20" height="76" rx="0 4 4 0" fill="rgba(0,0,0,0.08)"/>

  <!-- Windows -->
  <rect x="56"  y="122" width="28" height="24" rx="5" fill="#BAE6FD"/>
  <rect x="56"  y="122" width="28" height="2"  rx="1" fill="rgba(255,255,255,0.6)"/>
  <line x1="70" y1="122" x2="70" y2="146" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="56" y1="134" x2="84" y2="134" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>

  <rect x="116" y="122" width="28" height="24" rx="5" fill="#BAE6FD"/>
  <rect x="116" y="122" width="28" height="2"  rx="1" fill="rgba(255,255,255,0.6)"/>
  <line x1="130" y1="122" x2="130" y2="146" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="116" y1="134" x2="144" y2="134" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>

  <!-- Door -->
  <rect x="82" y="148" width="36" height="36" rx="6 6 0 0" fill="url(#rf-door)"/>
  <circle cx="115" cy="167" r="3" fill="#FCD34D"/>

  <!-- Roof shape -->
  <polygon points="30,112 100,44 170,112" fill="url(#rf-roof)" filter="url(#rf-shadow)"/>
  <!-- Roof ridge cap -->
  <line x1="30" y1="112" x2="170" y2="112" stroke="#92400E" stroke-width="3"/>

  <!-- Roof shingle rows (horizontal lines for texture) -->
  <line x1="48"  y1="97"  x2="152" y2="97"  stroke="rgba(0,0,0,0.12)" stroke-width="3" stroke-linecap="round"/>
  <line x1="63"  y1="82"  x2="137" y2="82"  stroke="rgba(0,0,0,0.12)" stroke-width="3" stroke-linecap="round"/>
  <line x1="78"  y1="67"  x2="122" y2="67"  stroke="rgba(0,0,0,0.12)" stroke-width="3" stroke-linecap="round"/>
  <!-- Shingle highlight lines -->
  <line x1="50"  y1="95"  x2="150" y2="95"  stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <line x1="65"  y1="80"  x2="135" y2="80"  stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <line x1="80"  y1="65"  x2="120" y2="65"  stroke="rgba(255,255,255,0.18)" stroke-width="2"/>

  <!-- Chimney -->
  <rect x="128" y="56" width="20" height="38" rx="3" fill="url(#rf-tile1)"/>
  <rect x="126" y="52" width="24" height="8"  rx="4" fill="#D97706"/>

  <!-- Roof glare -->
  <polygon points="50,110 100,50 110,60 65,110" fill="url(#rf-glare)" opacity="0.55"/>
</svg>
