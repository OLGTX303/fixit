<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixIt — UI Mockups</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #ECEEF1; font-family: 'DM Sans', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load order: tokens → screens → canvas → app -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="fixit-tokens.jsx"></script>
  <script type="text/babel" src="fixit-customer.jsx"></script>
  <script type="text/babel" src="fixit-provider.jsx"></script>
  <script type="text/babel" src="fixit-admin.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#FF6635",
      "showLabels": true
    }/*EDITMODE-END*/;

    // Device wrapper — shrinks each screen into the IOSDevice shell
    function Phone({ children, label, accent = '#FF6635' }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
          <IOSDevice width={360} height={780}>
            {children}
          </IOSDevice>
          <div style={{
            fontSize: 12, fontWeight: 600, color: '#6B7280',
            letterSpacing: 0.3, textAlign: 'center',
          }}>{label}</div>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Inject accent override into FX at render time
      React.useEffect(() => {
        if (window.FX) {
          window.FX.accent = t.accent;
          window.FX.accentDark = t.accent;
        }
      }, [t.accent]);

      const SECTIONS = [
        {
          id: 'customer',
          title: 'Customer',
          subtitle: '7 screens — Registration through review',
          screens: [
            { id: 'c1',  label: 'C1 · Login',           node: <C1_Login mode="login" /> },
            { id: 'c1r', label: 'C1b · Register',        node: <C1_Login mode="register" /> },
            { id: 'c2',  label: 'C2 · Browse Categories',node: <C2_Browse /> },
            { id: 'c3',  label: 'C3 · Search + Map',     node: <C3_Search /> },
            { id: 'c4',  label: 'C4 · Provider Detail',  node: <C4_ProviderDetail /> },
            { id: 'c5',  label: 'C5 · Booking Form',     node: <C5_BookingForm /> },
            { id: 'c6',  label: 'C6 · Job Tracker',      node: <C6_JobTracker /> },
            { id: 'c7',  label: 'C7 · Rate & Review',    node: <C7_Review /> },
          ],
        },
        {
          id: 'provider',
          title: 'Service Provider',
          subtitle: '5 screens — Onboarding through chat',
          screens: [
            { id: 'p1', label: 'P1 · Profile Setup',    node: <P1_Profile /> },
            { id: 'p2', label: 'P2 · KYC Upload',       node: <P2_KYC /> },
            { id: 'p3', label: 'P3 · Booking Requests', node: <P3_Requests /> },
            { id: 'p4', label: 'P4 · Job Status Update',node: <P4_JobUpdate /> },
            { id: 'p5', label: 'P5 · In-App Chat',      node: <P5_Chat /> },
          ],
        },
        {
          id: 'admin',
          title: 'Administrator',
          subtitle: '3 screens — Verification, management and monitoring',
          screens: [
            { id: 'a1', label: 'A1 · Provider Verification', node: <A1_Verification /> },
            { id: 'a2', label: 'A2 · User & Category Mgmt',  node: <A2_Management /> },
            { id: 'a3', label: 'A3 · Booking & Review Monitor', node: <A3_Monitoring /> },
          ],
        },
      ];

      return (
        <DesignCanvas>
          {SECTIONS.map(section => (
            <DCSection key={section.id} id={section.id} title={section.title} subtitle={section.subtitle}>
              {section.screens.map(s => (
                <DCArtboard key={s.id} id={s.id} label={t.showLabels ? s.label : ''} width={360} height={780}>
                  <Phone label={''} accent={t.accent}>
                    {s.node}
                  </Phone>
                </DCArtboard>
              ))}
            </DCSection>
          ))}

          <TweaksPanel>
            <TweakSection label="Brand" />
            <TweakColor
              label="Accent colour"
              value={t.accent}
              options={['#FF6635', '#2A6FDB', '#1F8A5B', '#8B5CF6', '#E11D48']}
              onChange={v => setTweak('accent', v)}
            />
            <TweakSection label="Canvas" />
            <TweakToggle
              label="Show screen labels"
              value={t.showLabels}
              onChange={v => setTweak('showLabels', v)}
            />
          </TweaksPanel>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
