name: Deploy to server

# Every push to master SSHes into the server (reachable via DDNS) and runs
# redeploy.sh, which pulls the latest code and rebuilds frontend + backend.
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH redeploy (frontend + backend + DB migrations)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy                 # least-privilege CI user (key-only)
          key: ${{ secrets.SSH_KEY }}      # private key; deploy may sudo ONLY redeploy.sh
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: sudo -n /root/redeploy.sh
