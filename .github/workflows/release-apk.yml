name: Build & Release Signed APK

# Trigger by pushing a version tag (git tag v1.1.0 && git push --tags),
# or run manually from the Actions tab with a version number.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. 1.1.0'
        required: true

permissions:
  contents: write   # needed to create the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.event.inputs.version || github.ref_name }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build web + sync Capacitor
        working-directory: fixit-pr3/fixit-frontend
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Stamp version into Gradle
        working-directory: fixit-pr3/fixit-frontend/android
        run: |
          V="${{ steps.ver.outputs.version }}"
          sed -i "s/versionName \".*\"/versionName \"$V\"/" app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle

      - name: Write signing config (from secrets)
        working-directory: fixit-pr3/fixit-frontend/android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS:   ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS:    ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS:     ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > release.keystore
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASS" "$KEY_ALIAS" "$KEY_PASS" > signing.properties

      - name: Assemble signed APK
        working-directory: fixit-pr3/fixit-frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/fixit-${{ steps.ver.outputs.version }}.apk"

      - name: Publish GitHub release (APK asset → consumed by OTA)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: FixIt ${{ steps.ver.outputs.version }}
          files: fixit-${{ steps.ver.outputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
