name: Manual APK release (semver tag)

# For milestone releases (e.g. v1.2.0). Day-to-day master pushes use deploy.yml
# which builds and publishes an APK in parallel with server deploy.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version, e.g. 1.2.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FRONTEND_DIR: fixit-pr3/fixit-frontend
      VITE_API_URL: https://fixit.olgtx.com/api
    steps:
      - uses: actions/checkout@v4

      - name: Check Android signing secrets
        id: sign
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is required"
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            REF="v${{ github.event.inputs.version }}"
          else
            REF="${{ github.ref_name }}"
          fi
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${REF}" >> "$GITHUB_OUTPUT"

      - name: Build web + sync Capacitor
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
        run: |
          npm ci
          npm run build
          npx cap sync android

      - name: Stamp version into Gradle
        working-directory: ${{ env.FRONTEND_DIR }}/android
        run: |
          V="${{ steps.ver.outputs.version }}"
          sed -i "s/versionName \".*\"/versionName \"$V\"/" app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle

      - name: Write signing config
        working-directory: ${{ env.FRONTEND_DIR }}/android
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > release.keystore
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASS" "$KEY_ALIAS" "$KEY_PASS" > signing.properties

      - name: Assemble signed release APK
        working-directory: ${{ env.FRONTEND_DIR }}/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          APK="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK" ]; then APK="app/build/outputs/apk/release/app-release-unsigned.apk"; fi
          cp "$APK" "$GITHUB_WORKSPACE/fixit-${{ steps.ver.outputs.version }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: FixIt ${{ steps.ver.outputs.version }}
          body: |
            <!-- version_code:${{ github.run_number }} -->
            version_code: ${{ github.run_number }}
          files: fixit-${{ steps.ver.outputs.version }}.apk
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}